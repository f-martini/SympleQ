name: Build and Publish Python Wheels

on: push

jobs:
  build-and-publish:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [3.11, 3.12, 3.13]
        arch: [x86_64, arm64]
        exclude:
          - os: windows-latest
            arch: arm64

    env:
      TWINE_USERNAME: __token__ # Use GitHub secret for PyPI token
      TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.arch }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel scikit-build cmake ninja twine

      - name: Configure CMake
        run: cmake --preset ${{ matrix.os }}-${{ matrix.arch }}

      - name: Build
        run: cmake --build build

      - name: Build wheel
        run: python -m pip wheel . -w dist/

      - name: Publish wheel to Test PyPI
        if: github.ref == 'refs/heads/main'
        run: python -m twine upload --repository testpypi dist/*
