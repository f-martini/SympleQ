name: Build and Publish Python Wheels

on: push

jobs:
  build-and-publish:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: [3.11, 3.12, 3.13]
        arch: [x64] # Changed from x86_64 to x64 to match your bat script
        exclude:
          - os: windows-latest
            arch: arm64

    env:
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ github.workspace }}/vcpkg"
          vcpkgGitCommitId: "15fd3bbcf7cc66249ba11f87a6215ee6f291bb26"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.arch }}

      - name: Set environment variables
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "ARCH=AMD64" >> $GITHUB_ENV
            echo "PRESET=windows-x86_64-Release" >> $GITHUB_ENV  # Adjust to your actual preset name
            echo "CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV
          else
            echo "ARCH=x86_64" >> $GITHUB_ENV
            echo "PRESET=linux-x86_64-Release" >> $GITHUB_ENV   # Adjust to your actual preset name
            echo "CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV
          fi

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel scikit-build-core nanobind twine

      - name: Build wheel
        working-directory: scripts/configs
        run: python -m pip wheel ../.. -w ../../dist/ --config-settings=cmake.args="--preset;${{ env.PRESET }}" --config-settings=cmake.define.CMAKE_TOOLCHAIN_FILE="${{ env.CMAKE_TOOLCHAIN_FILE }}"

      - name: Publish wheel to Test PyPI
        if: github.ref == 'refs/heads/main'
        run: python -m twine upload --repository testpypi dist/*
