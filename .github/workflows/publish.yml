name: Build and Publish QuAOS Wheels

on: push

env:
  PROJECT_NAME: "sympleq"
  NATIVE_SRC_PATH: src
  CUDA_VERSION: "12.5"
  GCC_VERSION: 12
  VCPKG_COMMIT_ID: "15fd3bbcf7cc66249ba11f87a6215ee6f291bb26"
  LINUX_PRESET_X64: linux-x86_64-Release
  CIBW_ARCHS_X64: x86_64
  SETUP_SCRIPT_PATH_X64: scripts/tools/ci/manylinux_x86_64.sh
  LINUX_PRESET_ARM64: linux-arm64-Release
  CIBW_ARCHS_ARM64: aarch64
  SETUP_SCRIPT_PATH_ARM64: scripts/tools/ci/manylinux_arm64.sh
  CMAKE_TOOLCHAIN_FILE: /tmp/vcpkg/scripts/buildsystems/vcpkg.cmake

jobs:
  build-linux:
    name: Build Linux - ${{ matrix.arch }} - Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
        python: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ===== Free up disk space =====
      - name: Free up disk space (Linux)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          docker system prune -af
          df -h

      # ===== Set up Python =====
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.arch }}

      # ===== Set environment variables =====
      - name: Set build environment variables
        shell: bash
        run: |
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            echo "CMAKE_PRESET=${LINUX_PRESET_X64}" >> $GITHUB_ENV
            echo "CIBW_ARCHS=${CIBW_ARCHS_X64}" >> $GITHUB_ENV
            echo "CIBW_SCRIPT=${SETUP_SCRIPT_PATH_X64}" >> $GITHUB_ENV
            else
            echo "CMAKE_PRESET=${LINUX_PRESET_ARM64}" >> $GITHUB_ENV
            echo "CIBW_ARCHS=${CIBW_ARCHS_ARM64}" >> $GITHUB_ENV
            echo "CIBW_SCRIPT=${SETUP_SCRIPT_ARM64}" >> $GITHUB_ENV
          fi

      - name: Set CIBW_BUILD for Python version
        shell: bash
        run: |
          PYTHON_VERSION="${{ matrix.python }}"
          CIBW_BUILD_VALUE="cp${PYTHON_VERSION//./}-*"
          echo "CIBW_BUILD_VERSION=$CIBW_BUILD_VALUE" >> $GITHUB_ENV

      # ===== Install build dependencies =====
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install cibuildwheel twine

      # ===== Build wheels with cibuildwheel =====
      - name: Build wheels (Linux)
        env:
          # Python and architecture settings
          CIBW_BUILD: ${{ env.CIBW_BUILD_VERSION }}
          CIBW_ARCHS: ${{ env.CIBW_ARCHS }}

          # Skip problematic builds
          CIBW_SKIP: "pp* *-musllinux*"

          # Environment variables for the build
          CIBW_ENVIRONMENT: >-
            CMAKE_TOOLCHAIN_FILE=${{ env.CMAKE_TOOLCHAIN_FILE }}
            CUDA_PATH=/usr/local/cuda
            VCPKG_ROOT=/tmp/vcpkg


          # Install CUDA and vcpkg before build
          CIBW_BEFORE_ALL_LINUX: >-
            bash ./${{ env.CIBW_SCRIPT }}

          # Install Python dependencies before build
          CIBW_BEFORE_BUILD: >-
            pip install scikit-build-core[pyproject] nanobind cmake ninja

          CIBW_CONFIG_SETTINGS: >-
            cmake.args=-S;${{ env.NATIVE_SRC_PATH }};--preset;${{ env.CMAKE_PRESET }}

          # Build settings
          CIBW_BUILD_VERBOSITY: 1

          # Test the built wheel
          CIBW_TEST_COMMAND: 'python -c "from quaos.core.light import Aquire; aquire = Aquire(''h'', [], {})"'

          # Repair settings for Linux
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            export LD_LIBRARY_PATH="$(find / -type d -path '*/intel64' 2>/dev/null | paste -sd: -):$LD_LIBRARY_PATH" &&
            echo "Running auditwheel repair..." &&
            auditwheel repair -w {dest_dir} {wheel}

        run: python -m cibuildwheel --output-dir ./dist

      # ===== Upload artifacts =====
      - name: List built wheels
        run: |
          echo "Built wheels:"
          ls -la dist/

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}-py${{ matrix.python }}
          path: dist/*.whl
          retention-days: 30

  build-windows:
    name: Build Windows - ${{ matrix.arch }} - Python ${{ matrix.python }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64]
        python: ["3.11", "3.12", "3.13"]

    env:
      LINUX_PRESET_X64: linux-x86_64-Release
      CIBW_ARCHS_X64:
      LINUX_PRESET_ARM64: linux-arm64-Release
      CIBW_ARCHS_ARM64:

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ===== Free up disk space =====
      - name: Free up disk space (Windows)
        run: |
          Get-PSDrive
          Remove-Item -Path "C:\Program Files\dotnet" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\Program Files (x86)\Android" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\ghc" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\hostedtoolcache\CodeQL" -Recurse -Force -ErrorAction SilentlyContinue
          Get-PSDrive
        shell: pwsh

      # ===== Set up Python =====
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.arch }}

      # ===== Set up CUDA Toolkit =====
      - name: Set up CUDA Toolkit (Windows)
        uses: Jimver/cuda-toolkit@v0.2.24
        id: cuda-toolkit
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: "network"

      - name: Verify CUDA installation
        run: |
          nvcc --version
          echo "CUDA installation path: $env:CUDA_PATH"

      # ===== Set up vcpkg =====
      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ github.workspace }}\\vcpkg"
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          vcpkgJsonGlob: "**\\vcpkg.json"

      # ===== Set environment variables =====
      - name: Set build environment variables
        shell: bash
        run: |
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            echo "CMAKE_PRESET=windows-x86_64-Release" >> $GITHUB_ENV
            echo "CIBW_ARCHS=AMD64" >> $GITHUB_ENV
          else
            echo "CMAKE_PRESET=windows-arm64-Release" >> $GITHUB_ENV
            echo "CIBW_ARCHS=ARM64" >> $GITHUB_ENV
          fi

          # Set common variables
          echo "CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}\\vcpkg\\scripts\\buildsystems\\vcpkg.cmake" >> $GITHUB_ENV
          echo "SOURCE_DIR=${{ github.workspace }}\\src" >> $GITHUB_ENV
          echo "BUILD_DIR=${{ github.workspace }}\\build" >> $GITHUB_ENV

      - name: Set CIBW_BUILD for Python version
        shell: bash
        run: |
          PYTHON_VERSION="${{ matrix.python }}"
          CIBW_BUILD_VALUE="cp${PYTHON_VERSION//./}-*"
          echo "CIBW_BUILD_VERSION=$CIBW_BUILD_VALUE" >> $GITHUB_ENV

      # ===== Install build dependencies =====
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install cibuildwheel twine

      # ===== Build wheels with cibuildwheel =====
      - name: Build wheels (Windows)
        env:
          # Python and architecture settings
          CIBW_BUILD: ${{ env.CIBW_BUILD_VERSION }}
          CIBW_ARCHS: ${{ env.CIBW_ARCHS }}

          # Skip problematic builds
          CIBW_SKIP: "pp*"

          # Environment variables for the build
          CIBW_ENVIRONMENT: CMAKE_PRESET="${{ env.CMAKE_PRESET }}" CMAKE_TOOLCHAIN_FILE="${{ env.CMAKE_TOOLCHAIN_FILE }}" SOURCE_DIR="${{ env.SOURCE_DIR }}" BUILD_DIR="${{ env.BUILD_DIR }}" CUDA_PATH="${{ env.CUDA_PATH }}" VCPKG_ROOT="${{ github.workspace }}\vcpkg"

          # Install dependencies before build
          CIBW_BEFORE_BUILD: >-
            dir &&
            echo "CIBW_BUILD=${{ env.CIBW_BUILD_VERSION }}" &&
            echo "CIBW_ARCHS=${{ env.CIBW_ARCHS }}" &&
            echo "CIBW_SKIP=${{ env.CIBW_SKIP }}" &&
            echo "CIBW_ENVIRONMENT=${{ env.CIBW_ENVIRONMENT }}" &&
            echo "CMAKE_PRESET=${{ env.CMAKE_PRESET }}" &&
            echo "CMAKE_TOOLCHAIN_FILE=${{ env.CMAKE_TOOLCHAIN_FILE }}" &&
            echo "SOURCE_DIR=${{ env.SOURCE_DIR }}" &&
            echo "BUILD_DIR=${{ env.BUILD_DIR }}" &&
            echo "CUDA_PATH=${{ env.CUDA_PATH }}" &&
            echo "VCPKG_ROOT=${{ env.VCPKG_ROOT }}" &&
            pip install scikit-build-core[pyproject] nanobind cmake ninja &&
            cmake --version &&
            nvcc --version

          # Build settings
          CIBW_BUILD_VERBOSITY: 1

          # Test the built wheel
          CIBW_TEST_COMMAND: 'python -c "from quaos.core.light import Aquire; aquire = Aquire(''h'', [], {})"'

          IBW_CONFIG_SETTINGS: >-
            cmake.args=-S;src;--preset;${{ env.CMAKE_PRESET }}

          # Repair settings for Windows
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair -w {dest_dir} {wheel}"

        run: python -m cibuildwheel --output-dir ./dist

      # ===== Upload artifacts =====
      - name: List built wheels
        run: |
          echo "Built wheels:"
          ls dist/

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.arch }}-py${{ matrix.python }}
          path: dist/*.whl
          retention-days: 30

  # ===== Collect and publish wheels =====
  publish:
    needs: [build-linux] #, build-windows]
    runs-on: ubuntu-latest
    # if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: artifacts
          merge-multiple: true

      - name: List all wheels
        run: |
          echo "All collected wheels:"
          ls -la artifacts/
          mkdir -p dist
          cp artifacts/*.whl dist/ 2>/dev/null || echo "No wheels found"
          ls -la dist/

      - name: Set up Python for publishing
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: pip install twine

      - name: Publish to Test PyPI (on main branch push)
        # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TEST }}
        run: |
          python -m twine upload --repository testpypi dist/quaos-*.whl --verbose --skip-existing

      - name: Publish to PyPI (on release)
        if: github.event_name == 'release'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m twine upload dist/quaos-*.whl --verbose
