name: Build and Publish QuAOS Wheels

on: push

env:
  CUDA_VERSION: "12.5.0"
  VCPKG_COMMIT_ID: "15fd3bbcf7cc66249ba11f87a6215ee6f291bb26"

jobs:
  build-linux:
    name: Build Linux - ${{ matrix.arch }} - Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64] # arm64 can be added later
        python: ["3.11", "3.12", "3.13"]

    env:
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ===== Free up disk space =====
      - name: Free up disk space (Linux)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          docker system prune -af
          df -h

      # ===== Set up Python =====
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.arch }}

      # ===== Set environment variables =====
      - name: Set build environment variables
        shell: bash
        run: |
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            echo "CMAKE_PRESET=linux-x86_64-Release" >> $GITHUB_ENV
            echo "CIBW_ARCHS=x86_64" >> $GITHUB_ENV
          else
            echo "CMAKE_PRESET=linux-arm64-Release" >> $GITHUB_ENV
            echo "CIBW_ARCHS=aarch64" >> $GITHUB_ENV
          fi

          # Set common variables
          echo "CMAKE_TOOLCHAIN_FILE=/tmp/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV
          echo "SOURCE_DIR=${{ github.workspace }}/src" >> $GITHUB_ENV
          echo "BUILD_DIR=${{ github.workspace }}/build" >> $GITHUB_ENV

      - name: Set CIBW_BUILD for Python version
        shell: bash
        run: |
          PYTHON_VERSION="${{ matrix.python }}"
          CIBW_BUILD_VALUE="cp${PYTHON_VERSION//./}-*"
          echo "CIBW_BUILD_VERSION=$CIBW_BUILD_VALUE" >> $GITHUB_ENV

      # ===== Install build dependencies =====
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install cibuildwheel twine

      # ===== Build wheels with cibuildwheel =====
      - name: Build wheels (Linux)
        env:
          # Python and architecture settings
          CIBW_BUILD: ${{ env.CIBW_BUILD_VERSION }}
          CIBW_ARCHS: ${{ env.CIBW_ARCHS }}

          # Skip problematic builds
          CIBW_SKIP: "pp* *-musllinux*"

          # Environment variables for the build
          CIBW_ENVIRONMENT: >-
            CMAKE_PRESET=${{ env.CMAKE_PRESET }}
            CMAKE_TOOLCHAIN_FILE=${{ env.CMAKE_TOOLCHAIN_FILE }}
            SOURCE_DIR=${{ env.SOURCE_DIR }}
            BUILD_DIR=${{ env.BUILD_DIR }}
            CUDA_PATH=/usr/local/cuda
            VCPKG_ROOT=/tmp/vcpkg
            PATH=/usr/local/cuda/bin:/opt/rh/gcc-toolset-12/root/usr/bin:$PATH
            LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH
            CC=/opt/rh/gcc-toolset-12/root/usr/bin/gcc
            CXX=/opt/rh/gcc-toolset-12/root/usr/bin/g++

          # Install CUDA and vcpkg before build
          CIBW_BEFORE_ALL_LINUX: >-
            echo "Installing system dependencies..." &&
            yum install -y epel-release &&
            echo "Removing default GCC to avoid conflicts..." &&
            yum remove -y gcc gcc-c++ || echo "Default GCC already removed or not found" &&
            yum install -y make git which gcc-toolset-12 curl zip unzip tar &&
            source /opt/rh/gcc-toolset-12/enable &&
            export CC=/opt/rh/gcc-toolset-12/root/usr/bin/gcc &&
            export CXX=/opt/rh/gcc-toolset-12/root/usr/bin/g++ &&
            echo "GCC version:" && $CC --version &&
            echo "GCC path:" && which gcc &&
            echo "Installing CUDA..." &&
            curl -fsSL https://developer.download.nvidia.com/compute/cuda/12.5.0/local_installers/cuda_12.5.0_555.42.02_linux.run -o cuda_installer.run &&
            sh cuda_installer.run --silent --toolkit --no-opengl-libs --no-man-page --no-drm &&
            ln -sf /usr/local/cuda-12.5 /usr/local/cuda &&
            echo "Installing vcpkg..." &&
            git clone https://github.com/Microsoft/vcpkg.git /tmp/vcpkg &&
            cd /tmp/vcpkg &&
            git checkout ${{ env.VCPKG_COMMIT_ID }} &&
            ./bootstrap-vcpkg.sh &&
            echo "CUDA and vcpkg installation complete"

          # Install Python dependencies before build
          CIBW_BEFORE_BUILD: >-
            pip install scikit-build-core[pyproject] nanobind cmake ninja &&
            echo "CMake version:" && cmake --version &&
            echo "CUDA version:" && nvcc --version

          CIBW_CONFIG_SETTINGS: >-
            cmake.args=-S;src;--preset;${{ env.CMAKE_PRESET }}

          # Build settings
          CIBW_BUILD_VERBOSITY: 1

          # Test the built wheel
          CIBW_TEST_COMMAND: 'python -c "import quaos; print(''QuAOS import successful'')"'

          # Repair settings for Linux
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            ls -l &&
            export LD_LIBRARY_PATH="$(find / -type d -path '*/intel64' 2>/dev/null | paste -sd: -):$LD_LIBRARY_PATH" &&
            export LD_LIBRARY_PATH="$(find / -type d -path '*/quaos/core/light' 2>/dev/null | paste -sd: -):$LD_LIBRARY_PATH" &&
            export LD_LIBRARY_PATH="$(find / -type d -path '*/quaos/core/light/.libs' 2>/dev/null | paste -sd: -):$LD_LIBRARY_PATH" &&
            echo "LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
            echo "Inspecting wheel: {wheel}" &&
            unzip -l {wheel} &&
            echo "Running auditwheel repair..." &&
            auditwheel repair -w {dest_dir} {wheel}

        run: python -m cibuildwheel --output-dir ./dist

      # ===== Upload artifacts =====
      - name: List built wheels
        run: |
          echo "Built wheels:"
          ls -la dist/

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}-py${{ matrix.python }}
          path: dist/*.whl
          retention-days: 30

  build-windows:
    name: Build Windows - ${{ matrix.arch }} - Python ${{ matrix.python }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64] # arm64 can be added later if needed
        python: ["3.11", "3.12", "3.13"]

    env:
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ===== Free up disk space =====
      - name: Free up disk space (Windows)
        run: |
          Get-PSDrive
          Remove-Item -Path "C:\Program Files\dotnet" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\Program Files (x86)\Android" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\ghc" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\hostedtoolcache\CodeQL" -Recurse -Force -ErrorAction SilentlyContinue
          Get-PSDrive
        shell: pwsh

      # ===== Set up Python =====
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.arch }}

      # ===== Set up CUDA Toolkit =====
      - name: Set up CUDA Toolkit (Windows)
        uses: Jimver/cuda-toolkit@v0.2.24
        id: cuda-toolkit
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: "network"

      - name: Verify CUDA installation
        run: |
          nvcc --version
          echo "CUDA installation path: $env:CUDA_PATH"

      # ===== Set up vcpkg =====
      - name: Cache vcpkg
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: |
            vcpkg
            !vcpkg/buildtrees
            !vcpkg/packages
            !vcpkg/downloads
          key: vcpkg-windows-${{ matrix.arch }}-${{ env.VCPKG_COMMIT_ID }}
          restore-keys: |
            vcpkg-windows-${{ matrix.arch }}-

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ github.workspace }}\\vcpkg"
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          vcpkgJsonGlob: "**\\vcpkg.json"

      # ===== Set environment variables =====
      - name: Set build environment variables
        shell: bash
        run: |
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            echo "CMAKE_PRESET=windows-x86_64-Release" >> $GITHUB_ENV
            echo "CIBW_ARCHS=AMD64" >> $GITHUB_ENV
          else
            echo "CMAKE_PRESET=windows-arm64-Release" >> $GITHUB_ENV
            echo "CIBW_ARCHS=ARM64" >> $GITHUB_ENV
          fi

          # Set common variables
          echo "CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}\\vcpkg\\scripts\\buildsystems\\vcpkg.cmake" >> $GITHUB_ENV
          echo "SOURCE_DIR=${{ github.workspace }}\\src" >> $GITHUB_ENV
          echo "BUILD_DIR=${{ github.workspace }}\\build" >> $GITHUB_ENV

      - name: Set CIBW_BUILD for Python version
        shell: bash
        run: |
          PYTHON_VERSION="${{ matrix.python }}"
          CIBW_BUILD_VALUE="cp${PYTHON_VERSION//./}-*"
          echo "CIBW_BUILD_VERSION=$CIBW_BUILD_VALUE" >> $GITHUB_ENV

      # ===== Install build dependencies =====
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install cibuildwheel twine

      # ===== Build wheels with cibuildwheel =====
      - name: Build wheels (Windows)
        env:
          # Python and architecture settings
          CIBW_BUILD: ${{ env.CIBW_BUILD_VERSION }}
          CIBW_ARCHS: ${{ env.CIBW_ARCHS }}

          # Skip problematic builds
          CIBW_SKIP: "pp*"

          # Environment variables for the build
          CIBW_ENVIRONMENT: CMAKE_PRESET="${{ env.CMAKE_PRESET }}" CMAKE_TOOLCHAIN_FILE="${{ env.CMAKE_TOOLCHAIN_FILE }}" SOURCE_DIR="${{ env.SOURCE_DIR }}" BUILD_DIR="${{ env.BUILD_DIR }}" CUDA_PATH="${{ env.CUDA_PATH }}" VCPKG_ROOT="${{ github.workspace }}\vcpkg"

          # Install dependencies before build
          CIBW_BEFORE_BUILD: >-
            echo "CIBW_BUILD=${{ env.CIBW_BUILD_VERSION }}" &&
            echo "CIBW_ARCHS=${{ env.CIBW_ARCHS }}" &&
            echo "CIBW_SKIP=${{ env.CIBW_SKIP }}" &&
            echo "CIBW_ENVIRONMENT=${{ env.CIBW_ENVIRONMENT }}" &&
            echo "CMAKE_PRESET=${{ env.CMAKE_PRESET }}" &&
            echo "CMAKE_TOOLCHAIN_FILE=${{ env.CMAKE_TOOLCHAIN_FILE }}" &&
            echo "SOURCE_DIR=${{ env.SOURCE_DIR }}" &&
            echo "BUILD_DIR=${{ env.BUILD_DIR }}" &&
            echo "CUDA_PATH=${{ env.CUDA_PATH }}" &&
            echo "VCPKG_ROOT=${{ env.VCPKG_ROOT }}" &&
            pip install scikit-build-core[pyproject] nanobind cmake ninja &&
            cmake --version &&
            nvcc --version

          # Build settings
          CIBW_BUILD_VERBOSITY: 1

          # Test the built wheel
          CIBW_TEST_COMMAND: 'python -c "import quaos; print(''QuAOS import successful'')"'

          IBW_CONFIG_SETTINGS: >-
            cmake.args=-S;src;--preset;${{ env.CMAKE_PRESET }}

          # Repair settings for Windows
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair -w {dest_dir} {wheel}"

        run: python -m cibuildwheel --output-dir ./dist

      # ===== Upload artifacts =====
      - name: List built wheels
        run: |
          echo "Built wheels:"
          ls dist/

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.arch }}-py${{ matrix.python }}
          path: dist/*.whl
          retention-days: 30

  # ===== Collect and publish wheels =====
  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    # if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: artifacts
          merge-multiple: true

      - name: List all wheels
        run: |
          echo "All collected wheels:"
          ls -la artifacts/
          mkdir -p dist
          cp artifacts/*.whl dist/ 2>/dev/null || echo "No wheels found"
          ls -la dist/

      - name: Set up Python for publishing
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: pip install twine

      - name: Publish to Test PyPI (on main branch push)
        # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TEST }}
        run: |
          python -m twine upload --repository testpypi dist/quaos-*.whl --verbose --skip-existing

      - name: Publish to PyPI (on release)
        if: github.event_name == 'release'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m twine upload dist/quaos-*.whl --verbose
